worker_processes auto;
rtmp_auto_push on;

error_log /dev/stderr info;

events {
    worker_connections 1024;
}

rtmp {
    server {
        listen 1935;
        chunk_size 4096;
        
        ping 30s;
        ping_timeout 10s;

        application live {
            live on;
            
            # Recordings
            record all;
            record_path /tmp/recordings;
            record_unique off;
            record_suffix .flv;
            record_append on;

            # HLS output - Stable streaming
            hls on;
            hls_path /tmp/hls;
            hls_fragment 2s;            # 2 second fragments
            hls_playlist_length 12s;    # 12 seconds playlist (6 fragments)
            hls_sync 100ms;
            hls_continuous on;
            hls_cleanup on;
            hls_nested off;             # Flat structure: {stream_key}.m3u8

            # Low latency settings
            wait_key on;
            wait_video on;
            publish_notify on;
            play_restart on;
            
            # Disable interleaving for lower latency
            interleave off;

            # Auth callbacks
            on_publish http://host.docker.internal:3000/api/rtmp/auth;
            on_publish_done http://host.docker.internal:3000/api/rtmp/done;
            
            # Recording callback
            exec_record_done curl -s -X POST "http://host.docker.internal:3000/api/rtmp/record-done?name=$name&path=$path";
        }
    }
}

http {
    access_log /dev/stdout combined;
    
    sendfile off;
    tcp_nopush on;
    tcp_nodelay on;
    directio 512;
    default_type application/octet-stream;

    server {
        listen 80;
        server_name _;

        # CORS headers
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;

        # HLS streaming
        location /hls {
            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t ts;
            }
            
            root /tmp;
            
            add_header 'Cache-Control' 'no-cache' always;
            add_header 'Access-Control-Allow-Origin' '*' always;
            
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '*';
                add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS';
                add_header 'Access-Control-Allow-Headers' '*';
                add_header 'Access-Control-Max-Age' 1728000;
                add_header 'Content-Type' 'text/plain; charset=utf-8';
                add_header 'Content-Length' 0;
                return 204;
            }
        }

        # Recordings access (internal use)
        location /recordings {
            internal;
            root /tmp;
        }

        # RTMP statistics
        location /stat {
            rtmp_stat all;
            rtmp_stat_stylesheet /stat.xsl;
            add_header 'Access-Control-Allow-Origin' '*' always;
        }

        location /stat.xsl {
            root /usr/local/nginx/html;
        }

        # Health check
        location /health {
            return 200 'OK';
            add_header Content-Type text/plain;
        }
    }
}
